<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Form Đăng Ký</h1>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label for="hoTen">Họ tên</label>
        <input type="text" id="hoTen" name="hoTen" maxlength="50">
        <div class="char-counter" id="hoTenCount">0/50</div>
        <span class="error" id="hoTenError"></span>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email">
        <span class="error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="soDienThoai">Số điện thoại</label>
        <input type="text" id="soDienThoai" name="soDienThoai">
        <span class="error" id="soDienThoaiError"></span>
      </div>

      <div class="form-group">
        <label for="matKhau">Mật khẩu</label>

        <div class="password-wrapper">
          <input type="password" id="matKhau" name="matKhau">
          <button type="button" id="togglePassword" class="toggle-password">👁</button>
        </div>

        <div class="strength-box">
          <div class="strength-bar-bg">
            <div class="strength-bar" id="passwordStrengthBar"></div>
          </div>
          <div class="strength-text" id="passwordStrengthText">Độ mạnh: Chưa nhập</div>
        </div>

        <span class="error" id="matKhauError"></span>
      </div>

      <div class="form-group">
        <label for="gioiTinh">Giới tính</label>
        <select id="gioiTinh" name="gioiTinh">
          <option value="">-- Chọn giới tính --</option>
          <option value="Nam">Nam</option>
          <option value="Nữ">Nữ</option>
          <option value="Khác">Khác</option>
        </select>
        <span class="error" id="gioiTinhError"></span>
      </div>

      <button type="submit">Gửi đăng ký</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
