<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Đặt Hàng</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Form Đặt Hàng</h1>

    <form id="orderForm" novalidate>
      <div class="form-group">
        <label for="sanPham">Tên sản phẩm</label>
        <select id="sanPham">
          <option value="">-- Chọn sản phẩm --</option>
          <option value="Áo">Áo</option>
          <option value="Quần">Quần</option>
          <option value="Giày">Giày</option>
        </select>
        <span class="error" id="sanPhamError"></span>
      </div>

      <div class="form-group">
        <label for="soLuong">Số lượng</label>
        <input type="number" id="soLuong" min="1" max="99">
        <span class="error" id="soLuongError"></span>
      </div>

      <div class="form-group">
        <label for="ngayGiao">Ngày giao hàng</label>
        <input type="date" id="ngayGiao">
        <span class="error" id="ngayGiaoError"></span>
      </div>

      <div class="form-group">
        <label for="diaChi">Địa chỉ giao</label>
        <textarea id="diaChi" rows="3"></textarea>
        <span class="error" id="diaChiError"></span>
      </div>

      <div class="form-group">
        <label for="ghiChu">Ghi chú</label>
        <textarea id="ghiChu" rows="4"></textarea>
        <div class="note-row">
          <span class="error" id="ghiChuError"></span>
          <span id="charCount">0/200</span>
        </div>
      </div>

      <div class="form-group">
        <label>Phương thức thanh toán</label>
        <div class="radio-group">
          <label><input type="radio" name="thanhToan" value="COD"> COD</label>
          <label><input type="radio" name="thanhToan" value="Chuyển khoản"> Chuyển khoản</label>
          <label><input type="radio" name="thanhToan" value="Ví điện tử"> Ví điện tử</label>
        </div>
        <span class="error" id="thanhToanError"></span>
      </div>

      <div class="form-group total-box">
        <strong>Tổng tiền: </strong>
        <span id="tongTien">0 đ</span>
      </div>

      <button type="submit">Đặt hàng</button>
    </form>

    <div id="confirmBox" class="confirm-box hidden">
      <h3>Xác nhận đặt hàng</h3>
      <div id="orderSummary"></div>
      <p>Bạn có chắc muốn đặt hàng?</p>
      <div class="confirm-actions">
        <button type="button" id="btnConfirm">Xác nhận</button>
        <button type="button" id="btnCancel">Hủy</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
