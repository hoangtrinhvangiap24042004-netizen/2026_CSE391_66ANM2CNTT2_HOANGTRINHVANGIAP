<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Bảng Điểm Sinh Viên</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Bảng Điểm Sinh Viên</h1>

<div class="form-group">
<input type="text" id="hoTen" placeholder="Nhập họ tên">
<input type="number" id="diem" placeholder="Nhập điểm">
<button id="btnThem">Thêm</button>
<button id="btnRandom">Tạo dữ liệu mẫu</button>
</div>

<div class="filter-group">
<input type="text" id="searchInput" placeholder="Tìm kiếm">

<select id="filterXepLoai">
<option value="Tất cả">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>
</div>

<table>

<thead>

<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="sortDiem">Điểm <span id="sortIcon"></span></th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>

</thead>

<tbody id="studentTableBody"></tbody>

</table>

<div id="thongKe">
Tổng số sinh viên: 0 | Điểm trung bình: 0
</div>

<script src="faker.js"></script>
<script src="script.js"></script>

</body>
</html>
